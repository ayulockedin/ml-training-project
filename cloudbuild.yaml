steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/ml-trainer:$BUILD_ID"
      - "."

  # Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/ml-trainer:$BUILD_ID"

images:
  - "gcr.io/$PROJECT_ID/ml-trainer:$BUILD_ID"
